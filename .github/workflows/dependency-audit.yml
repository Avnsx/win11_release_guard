name: Dependency audit

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "53 7 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Audit installed project dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" pip-audit
          pip-audit --local
