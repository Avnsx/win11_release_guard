name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile
        run: python -m compileall -q win11_release_guard tools

      - name: Audit GitHub action versions
        run: python tools/check_github_action_versions.py

      - name: Test
        run: pytest -q

      - name: Generate policy from fixtures
        run: >
          python tools/generate_policy.py
          --release-health-html tests/fixtures/windows11-release-health.html
          --atom-feed tests/fixtures/windows11-atom.xml
          --output-dir site
          --write-index
          --write-robots
          --write-sitemap
          --write-manifest

      - name: Validate CLI JSON
        run: >
          python -m win11_release_guard
          --json
          --no-wua
          --policy-url win11_release_guard/data/windows-release-policy.json
          |
          python -m json.tool

      - name: Create clean archive
        run: python tools/export_clean_archive.py

      - name: Scan for secret material
        run: >
          python tools/scan_for_secret_material.py
          site
          win11_release_guard
          tests
          tools
          docs
          README.md
          AGENTS.md
          pyproject.toml
          .github
