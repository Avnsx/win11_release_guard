name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile
        run: python -m compileall -q win11_release_guard

      - name: Validate console command
        run: win-release-guard --help

      - name: Test
        run: pytest -q

      - name: Generate policy from fixtures
        run: >
          python tools/generate_policy.py
          --release-health-html tests/fixtures/windows11-release-health.html
          --atom-feed tests/fixtures/windows11-atom.xml
          --output-dir site
          --write-index

      - name: Validate generated policy schema
        run: >
          python -c "import json; from pathlib import Path; from win11_release_guard.policy_schema import validate_policy_document; validate_policy_document(json.loads(Path('site/windows-release-policy.json').read_text(encoding='utf-8')))"

      - name: Validate CLI JSON
        run: >
          win-release-guard
          --json
          --no-wua
          --policy-url win11_release_guard/data/windows-release-policy.json
          | python -m json.tool
